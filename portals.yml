# Portal Scanner Configuration — Product Marketing | India · ASEAN · Middle East · Remote US/EMEA
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Product Marketing --
    - "Product Marketing"
    - "PMM"
    - "Go-to-Market"
    - "GTM"
    - "Product Launch"
    - "Launch Marketing"
    - "Market Positioning"
    - "Competitive Intelligence"
    - "Sales Enablement"
    - "Category Marketing"
    - "Category Design"
    # -- Growth Marketing --
    - "Growth Marketing"
    - "Demand Generation"
    - "Demand Gen"
    - "Growth Manager"
    - "Revenue Marketing"
    # -- Developer / Technical Marketing --
    - "Developer Marketing"
    - "Developer Relations"
    - "DevRel"
    - "Technical Marketing"
    - "Developer Advocacy"
    # -- Content & Brand Marketing --
    - "Content Marketing"
    - "Thought Leadership"
    - "Content Strategy"
    - "Brand Marketing"
    # -- Leadership titles --
    - "Head of Marketing"
    - "Head of Product Marketing"
    - "VP Marketing"
    - "VP of Product Marketing"
    - "Director of Marketing"
    - "Director of Product Marketing"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Apprentice"
    - "Engineer"
    - "Developer"
    - "Data Scientist"
    - "Machine Learning"
    - "Backend"
    - "Frontend"
    - "Full Stack"
    - "iOS"
    - "Android"
    - "DevOps"
    - "SRE"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"

# -- Search queries --
# Each query triggers a WebSearch. The scanner extracts title, URL, and company from results.

search_queries:

  # ==========================================================
  # INDIA — PRIMARY MARKET (10 queries)
  # India is the primary target. These queries cast the widest
  # net across all major India job portals and ATS platforms.
  # ==========================================================

  - name: Naukri — PMM Senior India
    query: 'site:naukri.com "Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" Bengaluru OR Mumbai OR "Delhi NCR" OR Hyderabad OR Pune'
    enabled: true

  - name: Naukri — PMM B2B SaaS India
    query: 'site:naukri.com "Product Marketing" "B2B" OR "SaaS" OR "enterprise" OR "Go-to-Market" Bengaluru OR Mumbai OR Hyderabad OR Pune'
    enabled: true

  - name: iimjobs — Senior PMM / Head of Marketing
    query: 'site:iimjobs.com "Product Marketing" OR "PMM" OR "Go-to-Market" OR "GTM" Senior OR Lead OR Director OR Head OR VP'
    enabled: true

  - name: Indeed India — PMM Bengaluru / Mumbai
    query: 'site:indeed.co.in "Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" Bengaluru OR Mumbai OR Hyderabad OR Pune OR "Delhi"'
    enabled: true

  - name: Foundit — PMM Senior India
    query: 'site:foundit.in "Product Marketing Manager" OR "Senior PMM" OR "Head of Marketing" OR "GTM Manager" Bengaluru OR Mumbai OR Hyderabad OR Delhi'
    enabled: true

  - name: HiRist — PMM Tech India
    query: 'site:hirist.tech "Product Marketing" OR "PMM" OR "Growth Marketing" OR "Go-to-Market" Bengaluru OR Mumbai OR Hyderabad'
    enabled: true

  - name: Cutshort — PMM India startups
    query: 'site:cutshort.io "Product Marketing" OR "PMM" OR "Go-to-Market" Bengaluru OR Mumbai OR remote India'
    enabled: true

  - name: Instahyre — PMM India
    query: 'site:instahyre.com "Product Marketing" OR "PMM" OR "Growth Marketing" Bengaluru OR Mumbai OR Delhi OR Hyderabad'
    enabled: true

  - name: Wellfound — PMM India startups
    query: 'site:wellfound.com "Product Marketing" OR "PMM" OR "Go-to-Market" India Bengaluru OR Mumbai OR remote'
    enabled: true

  - name: LinkedIn — PMM India (Bengaluru / Mumbai / Hyderabad)
    query: '"Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" OR "Director Product Marketing" "Bengaluru" OR "Mumbai" OR "Hyderabad" OR "Pune" OR "Delhi NCR" -internship -junior'
    enabled: true

  # ATS portals with India location filter — surfaces companies
  # NOT in the tracked list that post on Greenhouse/Ashby/Lever

  - name: Greenhouse — PMM India location
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Marketing" India OR Bengaluru OR Mumbai OR Hyderabad'
    enabled: true

  - name: Ashby — PMM India location
    query: 'site:jobs.ashbyhq.com "Product Marketing" OR "PMM" India OR Bengaluru OR Mumbai OR Hyderabad'
    enabled: true

  - name: Lever — PMM India location
    query: 'site:jobs.lever.co "Product Marketing" OR "PMM" India OR Bengaluru OR Mumbai OR Hyderabad'
    enabled: true

  # ==========================================================
  # SINGAPORE / ASEAN — SECONDARY MARKET (4 queries)
  # ==========================================================

  - name: MyCareersFuture — PMM Singapore
    query: 'site:mycareersfuture.gov.sg "Product Marketing Manager" OR "Senior PMM" OR "Head of Marketing" OR "Go-to-Market"'
    enabled: true

  - name: LinkedIn — PMM Singapore / ASEAN
    query: '"Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" Singapore OR "Southeast Asia" OR ASEAN -internship -junior'
    enabled: true

  - name: JobStreet — PMM ASEAN
    query: 'site:jobstreet.com "Product Marketing" OR "PMM" Singapore OR Malaysia OR Indonesia OR Thailand OR Philippines'
    enabled: true

  - name: Greenhouse / Ashby — PMM Singapore APAC
    query: 'site:boards.greenhouse.io OR site:jobs.ashbyhq.com "Product Marketing" Singapore OR APAC OR "Southeast Asia"'
    enabled: true

  # ==========================================================
  # MIDDLE EAST — SECONDARY MARKET (4 queries)
  # ==========================================================

  - name: LinkedIn — PMM Dubai / UAE / Saudi
    query: '"Product Marketing Manager" OR "Senior PMM" OR "Head of Marketing" Dubai OR UAE OR "Abu Dhabi" OR Riyadh OR "Saudi Arabia" -internship -junior'
    enabled: true

  - name: Bayt — PMM GCC
    query: 'site:bayt.com "Product Marketing Manager" OR "PMM" OR "Go-to-Market" OR "Head of Marketing" Dubai OR UAE OR "Saudi Arabia" OR Riyadh OR Qatar OR Doha'
    enabled: true

  - name: GulfTalent — PMM GCC
    query: 'site:gulftalent.com "Product Marketing" OR "PMM" OR "Growth Marketing" Dubai OR UAE OR Riyadh OR Doha OR "Abu Dhabi"'
    enabled: true

  - name: Naukrigulf — PMM Gulf
    query: 'site:naukrigulf.com "Product Marketing Manager" OR "Head of Marketing" OR "Senior PMM" Dubai OR UAE OR Saudi OR Riyadh'
    enabled: true

  # ==========================================================
  # REMOTE US/EMEA — TERTIARY (fully remote only) (5 queries)
  # ==========================================================

  - name: Ashby — PMM Remote global
    query: 'site:jobs.ashbyhq.com "Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" remote'
    enabled: true

  - name: Greenhouse — PMM Remote global
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Marketing Manager" OR "Senior PMM" remote'
