# Portal Scanner Configuration — Product Marketing | India · ASEAN · Middle East · Remote US/EMEA
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Product Marketing --
    - "Product Marketing"
    - "PMM"
    - "Go-to-Market"
    - "GTM"
    - "Product Launch"
    - "Launch Marketing"
    - "Market Positioning"
    - "Competitive Intelligence"
    - "Sales Enablement"
    - "Category Marketing"
    - "Category Design"
    # -- Growth Marketing --
    - "Growth Marketing"
    - "Demand Generation"
    - "Demand Gen"
    - "Growth Manager"
    - "Revenue Marketing"
    # -- Developer / Technical Marketing --
    - "Developer Marketing"
    - "Developer Relations"
    - "DevRel"
    - "Technical Marketing"
    - "Developer Advocacy"
    # -- Content & Brand Marketing --
    - "Content Marketing"
    - "Thought Leadership"
    - "Content Strategy"
    - "Brand Marketing"
    # -- Leadership titles --
    - "Head of Marketing"
    - "Head of Product Marketing"
    - "VP Marketing"
    - "VP of Product Marketing"
    - "Director of Marketing"
    - "Director of Product Marketing"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Apprentice"
    - "Engineer"
    - "Developer"
    - "Data Scientist"
    - "Machine Learning"
    - "Backend"
    - "Frontend"
    - "Full Stack"
    - "iOS"
    - "Android"
    - "DevOps"
    - "SRE"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"

# -- Search queries --
# Each query triggers a WebSearch. The scanner extracts title, URL, and company from results.

search_queries:

  # -- India --

  - name: LinkedIn — PMM Bengaluru / Mumbai / Delhi
    query: '"Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" Bengaluru OR Mumbai OR "Delhi NCR" OR Hyderabad OR Pune'
    enabled: true

  - name: Naukri — PMM India
    query: 'site:naukri.com "Product Marketing Manager" OR "Senior PMM" OR "Head of Marketing" Bengaluru OR Mumbai OR Delhi OR Hyderabad'
    enabled: true

  - name: iimjobs — Senior PMM India
    query: 'site:iimjobs.com "Product Marketing" OR "PMM" OR "Go-to-Market" Senior OR Lead OR Director OR Head'
    enabled: true

  - name: Instahyre — PMM India
    query: 'site:instahyre.com "Product Marketing" OR "PMM" OR "Growth Marketing" Bengaluru OR Mumbai OR Delhi'
    enabled: true

  - name: Cutshort — PMM India startups
    query: 'site:cutshort.io "Product Marketing" OR "PMM" OR "Go-to-Market" Bengaluru OR Mumbai OR remote India'
    enabled: true

  # -- Singapore / ASEAN --

  - name: MyCareersFuture — PMM Singapore
    query: 'site:mycareersfuture.gov.sg "Product Marketing Manager" OR "Senior PMM" OR "Head of Marketing"'
    enabled: true

  - name: LinkedIn — PMM Singapore / ASEAN
    query: '"Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" Singapore OR "Southeast Asia" OR ASEAN'
    enabled: true

  - name: JobStreet — PMM ASEAN
    query: 'site:jobstreet.com "Product Marketing" OR "PMM" Singapore OR Malaysia OR Indonesia OR Thailand OR Philippines'
    enabled: true

  # -- Middle East --

  - name: LinkedIn — PMM Dubai / UAE
    query: '"Product Marketing Manager" OR "Senior PMM" OR "Head of Marketing" Dubai OR UAE OR "Abu Dhabi"'
    enabled: true

  - name: Bayt — PMM Middle East
    query: 'site:bayt.com "Product Marketing Manager" OR "PMM" OR "Go-to-Market" Dubai OR UAE OR "Saudi Arabia" OR Riyadh OR Qatar'
    enabled: true

  - name: GulfTalent — PMM GCC
    query: 'site:gulftalent.com "Product Marketing" OR "PMM" OR "Growth Marketing" Dubai OR UAE OR Riyadh OR Doha'
    enabled: true

  - name: Naukrigulf — PMM Gulf
    query: 'site:naukrigulf.com "Product Marketing Manager" OR "Head of Marketing" OR "Senior PMM" Dubai OR UAE OR Saudi'
    enabled: true

  # -- Remote US/EMEA (fully remote) --

  - name: Ashby — PMM Remote
    query: 'site:jobs.ashbyhq.com "Product Marketing Manager" OR "Senior PMM" OR "Head of Product Marketing" remote'
    enabled: true

  - name: Greenhouse — PMM Remote
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Marketing Manager" OR "Senior PMM" remote'
    enabled: true

  - name: Himalayas — PMM Remote
    query: 'site:himalayas.app "Product Marketing" OR "PMM" remote'
    enabled: true

  - name: WeWorkRemotely — PMM
    query: 'site:weworkremotely.com "Product Marketing" OR "PMM"'
    enabled: true

  - name: Remote.co — PMM
    query: 'site:remote.co "Product Marketing Manager" OR "Senior PMM"'
    enabled: true

  - name: YC Jobs — PMM Remote
    query: 'site:ycombinator.com/jobs OR site:workatastartup.com "Product Marketing" OR "PMM" remote'
    enabled: true

  - name: Workable — PMM Remote
    query: 'site:apply.workable.com "Product Marketing Manager" OR "Senior PMM" remote'
    enabled: true

  # -- AI company PMM roles (remote + India/SG) --

  - name: Ashby — PMM at AI/DevTool companies
    query: 'site:jobs.ashbyhq.com "Product Marketing" AI OR "developer tools" OR "developer experience" OR platform remote OR India OR Singapore'
    enabled: true

  - name: Greenhouse — PMM SaaS/B2B
    query: 'site:boards.greenhouse.io "Product Marketing Manager" "B2B" OR "SaaS" OR "enterprise" remote OR India OR Singapore'
    enabled: true

  - name: Lever — PMM DevTools
    query: 'site:jobs.lever.co "Product Marketing" OR "PMM" developer OR platform OR SaaS remote OR India OR Singapore'
    enabled: true

