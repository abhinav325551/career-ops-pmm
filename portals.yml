  - name: Himalayas — PMM Remote
    query: 'site:himalayas.app "Product Marketing" OR "PMM" remote'
    enabled: true

  - name: WeWorkRemotely — PMM
    query: 'site:weworkremotely.com "Product Marketing" OR "PMM"'
    enabled: true

  - name: YC Jobs — PMM Remote
    query: 'site:ycombinator.com/jobs OR site:workatastartup.com "Product Marketing" OR "PMM" remote'
    enabled: true

  # -- Tier 8 global companies: remote or visa relocation only --

  - name: Greenhouse — AI Labs PMM Remote/Relocation
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Marketing" AI OR "developer marketing" remote OR "visa sponsorship" OR "relocation"'
    enabled: true

  - name: Ashby — AI/DevTool PMM Remote/Relocation
    query: 'site:jobs.ashbyhq.com "Product Marketing" OR "PMM" OR "developer marketing" remote OR "visa sponsorship" OR "work anywhere"'
    enabled: true

  - name: Voice AI Companies — PMM Remote
    query: '"ElevenLabs" OR "PolyAI" OR "Hume AI" OR "Deepgram" OR "Vapi" "Product Marketing" OR "PMM" remote'
    enabled: true

  - name: Contact Center AI — PMM Remote
    query: '"Ada" OR "LivePerson" OR "Sierra AI" OR "Talkdesk" OR "Genesys" "Product Marketing" OR "PMM" remote'
    enabled: true

  - name: LLMOps/Automation — PMM Remote
